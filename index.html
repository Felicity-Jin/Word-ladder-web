<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Ladder Game</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="container">
    <h1>Word Ladder Game</h1>
    <p>Transform the start word into the end word by changing exactly one letter at a time.</p>

    <section class="card" id="setupSection">
      <h2>Start a New Game</h2>

      <input id="startInput" placeholder="Start word, e.g. cold" />
      <input id="endInput" placeholder="End word, e.g. warm" />

      <button id="startBtn">Start Game</button>

      <p id="setupMessage"></p>
    </section>

    <section class="card hidden" id="gameSection">
      <h2>Current Game</h2>

      <p><strong>Starting Word:</strong> <span id="startWord"></span></p>
      <p><strong>Ending Word:</strong> <span id="endWord"></span></p>
      <p><strong>Steps:</strong> <span id="steps">0</span>/8</p>
      <p><strong>Best Score:</strong> <span id="bestScore">0</span></p>

      <input id="wordInput" placeholder="Enter next word" />
      <button id="submitBtn">Submit Word</button>
      <button id="resetBtn">Reset Game</button>

      <p id="gameMessage"></p>

      <h2>Current Ladder</h2>
      <ol id="ladder"></ol>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
